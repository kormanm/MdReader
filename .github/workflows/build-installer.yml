name: Build Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version to build, with or without a leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Resolve installer version
      id: version
      shell: pwsh
      run: |
        $version = "1.0.0"
        $tag = ""
        $createRelease = $false

        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "A version is required for manual runs."
          }
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $tag = "v$version"
          $createRelease = $true
        }
        elseif ($env:GITHUB_REF -like "refs/tags/v*") {
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $tag = $env:GITHUB_REF_NAME
          $createRelease = $true
        }

        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "create_release=$($createRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: pwsh

    - name: Build installer
      run: >
        & ".\src\MdReader.Installer\build-and-create-installer.ps1"
        -Configuration Release
        -AppVersion "${{ steps.version.outputs.version }}"
      shell: pwsh

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: MdReaderSetup-${{ steps.version.outputs.version }}
        path: installer-output/*.exe
        if-no-files-found: error

    - name: Attach installer to GitHub release
      if: steps.version.outputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: installer-output/*.exe
        fail_on_unmatched_files: true
        generate_release_notes: true
        tag_name: ${{ steps.version.outputs.tag }}
        target_commitish: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
